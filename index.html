<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Tecnología</title>
</head>
<body>
    

<footer class="footer-tech">
    <div class="footer-container">
        <div class="footer-section">
            <h2 class="logo">Tech<span>Store</span></h2>
            <p>Innovación a tu alcance. Los mejores gadgets y hardware del mercado.</p>
        </div>

        <div class="footer-section">
            <h3>Explorar</h3>
            <ul>
                <li><a href="#">Laptops</a></li>
                <li><a href="#">Componentes</a></li>
                <li><a href="#">Periféricos</a></li>
                <li><a href="#">Ofertas</a></li>
            </ul>
        </div>

        <div class="footer-section">
            <h3>Contacto</h3>
            <p>Email: soporte@techstore.com</p>
            <p>Tel: +123 456 789</p>
        </div>
    </div>

    <div class="footer-bottom">
        <p>&copy; SEMINARIO TALLER</p>
    </div>
</footer>

<style>
    .footer-tech {
        background-color: #1a1a1a;
        color: #ffffff;
        padding: 40px 20px 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .footer-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 20px;
    }

    .footer-section {
        flex: 1;
        min-width: 250px;
    }

    .footer-section h2.logo {
        font-size: 1.5rem;
        margin-bottom: 15px;
    }

    .footer-section h2.logo span {
        color: #007bff; /* Color azul tecnológico */
    }

    .footer-section h3 {
        font-size: 1.2rem;
        margin-bottom: 15px;
        border-bottom: 2px solid #007bff;
        display: inline-block;
    }

    .footer-section p {
        font-size: 0.9rem;
        line-height: 1.6;
        color: #cccccc;
    }

    .footer-section ul {
        list-style: none;
        padding: 0;
    }

    .footer-section ul li {
        margin-bottom: 10px;
    }

    .footer-section ul li a {
        color: #cccccc;
        text-decoration: none;
        transition: color 0.3s;
    }

    .footer-section ul li a:hover {
        color: #007bff;
    }

    .footer-bottom {
        text-align: center;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid #333;
        font-size: 0.8rem;
        color: #777;
    }

    /* Ajuste para móviles */
    @media (max-width: 768px) {
        .footer-container {
            flex-direction: column;
            text-align: center;
        }
        
        .footer-section h3 {
            display: block;
        }
    }
</style>
    
</body>
</html>
